<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-labelledby="title desc">
  <title id="title">SRAC ISO 9001</title>
  <desc id="desc">Insigna stilizata pentru certificare ISO 9001.</desc>
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eeeffb"/>
      <stop offset="1" stop-color="#8f94d4"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="16" fill="url(#card)"/>
  <rect x="0" y="22" width="180" height="26" fill="#d9dbf3"/>
  <rect x="0" y="48" width="180" height="26" fill="#c4c8ec"/>
  <rect x="0" y="74" width="180" height="26" fill="#adb3e5"/>
  <rect x="0" y="100" width="180" height="26" fill="#979fdc"/>
  <rect x="0" y="126" width="180" height="54" fill="#5961b5"/>
  <text x="90" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="44" font-weight="700" letter-spacing="2" fill="#f8f9ff">SR</text>
  <text x="90" y="121" text-anchor="middle" font-family="Arial, sans-serif" font-size="44" font-weight="700" letter-spacing="2" fill="#f8f9ff">AC</text>
  <text x="90" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" letter-spacing="2.8" fill="#e9edff">CERTIFIED QUALITY</text>
  <text x="90" y="171" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1.4" fill="#ffffff">ISO 9001</text>
</svg>