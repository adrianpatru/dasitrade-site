<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-labelledby="title desc">
  <title id="title">SRAC ISO 14001</title>
  <desc id="desc">Insigna stilizata pentru certificare ISO 14001.</desc>
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#edf8f7"/>
      <stop offset="1" stop-color="#5cabaa"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="16" fill="url(#card)"/>
  <rect x="0" y="22" width="180" height="26" fill="#d8efed"/>
  <rect x="0" y="48" width="180" height="26" fill="#c1e4e0"/>
  <rect x="0" y="74" width="180" height="26" fill="#a7d6d2"/>
  <rect x="0" y="100" width="180" height="26" fill="#85c6c2"/>
  <rect x="0" y="126" width="180" height="54" fill="#2f8f8b"/>
  <text x="90" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="44" font-weight="700" letter-spacing="2" fill="#f7fffd">SR</text>
  <text x="90" y="121" text-anchor="middle" font-family="Arial, sans-serif" font-size="44" font-weight="700" letter-spacing="2" fill="#f7fffd">AC</text>
  <text x="90" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" letter-spacing="2.8" fill="#e0fff9">ENVIRONMENT</text>
  <text x="90" y="171" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1.1" fill="#ffffff">ISO 14001</text>
</svg>