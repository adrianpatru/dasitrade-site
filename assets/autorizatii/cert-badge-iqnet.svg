    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="90" fill="url(#bg)"/>
  <circle cx="90" cy="90" r="74" fill="none" stroke="#eef4ff" stroke-width="2.5" stroke-dasharray="3 5"/>
