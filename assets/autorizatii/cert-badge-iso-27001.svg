<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-labelledby="title desc">
  <title id="title">ISO 27001 Information Security Management</title>
  <desc id="desc">Insigna stilizata pentru certificare ISO 27001.</desc>
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3aa0e6"/>
      <stop offset="1" stop-color="#145bb3"/>
    </linearGradient>
  </defs>
  <circle cx="90" cy="90" r="84" fill="#ffffff" stroke="url(#ring)" stroke-width="4"/>
  <circle cx="90" cy="90" r="64" fill="#f5fbff" stroke="#bfd8f3" stroke-width="2"/>
  <path d="M90 44c18 0 34 6 46 17" fill="none" stroke="#35b778" stroke-width="4" stroke-linecap="round"/>
  <text x="90" y="37" text-anchor="middle" font-family="Arial, sans-serif" font-size="9.5" letter-spacing="1.9" fill="#2f6fb0">INFORMATION SECURITY</text>
  <text x="90" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="9.5" letter-spacing="1.9" fill="#2f6fb0">MANAGEMENT</text>
  <text x="90" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#6b7178">ISO</text>
  <text x="90" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1460b3">27001</text>
  <text x="90" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="9.5" letter-spacing="2.2" fill="#2f6fb0">CERTIFIED</text>
</svg>