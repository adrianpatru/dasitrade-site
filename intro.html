<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8"/>
<title>Dasitrade · Secure Boot Intro</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="description" content="Intro cinematic Dasitrade pentru experiența de brand a noului site."/>
<meta name="theme-color" content="#050709"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter+Tight:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="intro.css"/>
</head>
<body>
<main class="intro-shell" id="intro-root" aria-label="Secvență introductivă Dasitrade">
  <div class="intro-vignette" aria-hidden="true"></div>
  <div class="intro-grain" aria-hidden="true"></div>
  <div class="intro-scanline" aria-hidden="true"></div>

  <div class="intro-corners" aria-hidden="true">
    <span class="intro-corner intro-corner--tl"></span>
    <span class="intro-corner intro-corner--tr"></span>
    <span class="intro-corner intro-corner--bl"></span>
    <span class="intro-corner intro-corner--br"></span>
  </div>

  <header class="intro-topbar">
    <div class="intro-topbar__item">[ SECURE BOOT ]</div>
    <div class="intro-topbar__item">BACĂU · DIN 2006</div>
    <div class="intro-topbar__item" data-intro-clock>SYS · --:--:--</div>
  </header>

  <section class="intro-center">
    <div class="intro-kicker">CURENȚI SLABI · SISTEME DE SECURITATE</div>
    <h1 class="intro-title">DASITRADE SYSTEM</h1>
    <p class="intro-version">enterprise intro protocol · v2.0</p>
    <div class="intro-divider" aria-hidden="true"></div>
    <div class="intro-access" data-intro-access>
      <span class="intro-access__dot"></span>
      <span>ACCESS GRANTED</span>
    </div>
  </section>

  <section class="intro-terminal" aria-live="polite" aria-label="Stare boot secvență introductivă">
    <div class="intro-terminal__head">
      <span>CORE INITIALIZATION</span>
      <span data-intro-status>STANDBY</span>
    </div>
    <div class="intro-terminal__lines" id="intro-lines"></div>
  </section>

  <footer class="intro-footer">
    <div class="intro-footer__item">Bld. Unirii, Nr. 92 B · Bacău</div>
    <div class="intro-footer__item">DISPECERAT 24/7 · 0334 401 092</div>
    <div class="intro-footer__item">www.dasitrade.ro</div>
  </footer>
</main>

<script src="intro.js"></script>
</body>
</html>
